version: 2

project_name: agenc

before:
  hooks:
    - go mod tidy
    - sh -c "test -f internal/claudeconfig/prime_content.md || touch internal/claudeconfig/prime_content.md"
    - go run ./cmd/genprime

builds:
  - id: agenc
    main: ./main.go
    binary: agenc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/odyssey/agenc/internal/version.Version={{.Version}}

archives:
  - id: agenc
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

nfpms:
  - id: packages
    package_name: agenc
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: mieubrisse
    homepage: "https://github.com/mieubrisse/agenc"
    maintainer: "mieubrisse"
    description: "AgenC - Agent orchestration system"
    license: "AGPL-3.0"
    formats:
      - deb
    bindir: /usr/bin
    section: utils
    priority: optional
    dependencies:
      - gh
      - fzf
      - tmux
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

publishers:
  - name: fury
    ids:
      - packages
    cmd: >-
      curl -sf -F package=@{{ .ArtifactPath }}
      https://{{ .Env.FURY_PUSH_TOKEN }}@push.fury.io/mieubrisse/

brews:
  - name: agenc
    repository:
      owner: mieubrisse
      name: homebrew-agenc
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/mieubrisse/agenc"
    description: "AgenC - Agent orchestration system"
    license: "AGPL-3.0"
    dependencies:
      - name: gh
      - name: fzf
      - name: tmux
    install: |
      bin.install "agenc"
    caveats: |
      🚨 If the AgenC server is running, it is still using the old version.
      The server will auto-restart on your next `agenc` CLI command, or you
      can restart it now:

        agenc server restart
    test: |
      system "#{bin}/agenc", "--version"
