version: "2"

linters:
  enable:
    - errcheck      # Checks for unchecked errors
    - gosec         # Inspects source code for security problems
    - govet         # Reports suspicious constructs
    - staticcheck   # Advanced static analysis
    - unused        # Checks for unused constants, variables, functions and types
    - gocyclo       # Computes and checks the cyclomatic complexity of functions
  settings:
    gocyclo:
      min-complexity: 35  # Start permissive, tighten over time
    errcheck:
      exclude-functions:
        # Close/cleanup in defer — nothing useful to do with the error
        - (*database/sql.DB).Close
        - (*database/sql.Conn).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
        - (*os.File).Write
        - (*bufio.Reader).ReadBytes
        - (*net/http.Response).Body.Close
        - (*net/http.Server).Close
        - (io.Closer).Close
        - (net.Listener).Close
        - io.Copy
        - os.Remove
        - os.RemoveAll
        - os.MkdirAll
        - os.Setenv
        - os.Stdout.Write
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Sscanf
        # Project database type
        - (*github.com/odyssey/agenc/internal/database.DB).Close
        # Cobra flag helpers that only fail on programmer error
        - (*github.com/spf13/pflag.FlagSet).MarkHidden
        # Terminal restore in defer
        - golang.org/x/term.Restore
        # fsnotify watcher
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        # exec.Cmd in fire-and-forget contexts
        - (*os/exec.Cmd).Run
        - (*os/exec.Cmd).Wait
        - (*os.Process).Kill
    gosec:
      excludes:
        - G101  # Hardcoded credentials — false positives on const names
        - G104  # Errors unhandled — covered by errcheck with exclusions
        - G112  # Slowloris — internal unix socket server, not internet-facing
        - G122  # Filepath.Walk race — acceptable for config file operations
        - G204  # Subprocess with variable — unavoidable in a CLI tool
        - G301  # Directory permissions 0755 — standard for CLI tools
        - G302  # File permissions 0644 — standard for log files
        - G304  # File inclusion via variable — unavoidable in a CLI tool
        - G306  # WriteFile permissions 0644 — standard for non-secret files
        - G702  # Command injection via taint — false positives on exec.Command
        - G703  # Path traversal via taint — false positives on os.RemoveAll
        - G704  # SSRF via taint — false positive on unix socket dial
        - G706  # Log injection via taint — false positives on log.Printf
    staticcheck:
      checks:
        - "all"
        - "-QF*"   # Disable quickfix suggestions — style, not correctness
        - "-ST1000" # Package comments — not enforced yet
        - "-ST1003" # Naming conventions (e.g., JSON vs Json) — fix over time
        - "-SA1019" # Deprecated usage — fix when removing deprecated code

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
